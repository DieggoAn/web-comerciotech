<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComercioTech - Panel de Control del Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">💼 ComercioTech <span class="text-blue-300 text-sm font-normal">(Base de Datos Real)</span></h1>
            <span class="bg-green-600 px-3 py-1 rounded text-xs uppercase font-semibold border border-green-700">Fase 2: MongoDB Conectado</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 lg:col-span-1">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                📦 Registrar Producto
            </h2>
            <form action="/guardar" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">SKU (Código Único)</label>
                    <input type="text" name="sku" required placeholder="Ej: PROD-100" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Nombre Comercial</label>
                    <input type="text" name="nombre" required placeholder="Ej: Monitor Gamer 24" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Precio ($)</label>
                    <input type="number" name="precio" step="0.01" required placeholder="0.00" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition text-sm shadow-sm mt-2">
                    Guardar en Catálogo Real
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 lg:col-span-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-900">📋 Productos en MongoDB</h2>
                <button onclick="window.location.reload()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded border border-gray-300 transition">
                    🔄 Actualizar Tabla
                </button>
            </div>
