<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComercioTech - Panel de Control del Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">💼 ComercioTech <span class="text-blue-300 text-sm font-normal">(Entorno Web Simulado)</span></h1>
            <span class="bg-blue-800 px-3 py-1 rounded text-xs uppercase font-semibold border border-blue-700">Fase 1: Local RAM</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 lg:col-span-1">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                📦 Registrar Producto
            </h2>
            <form id="formulario-producto" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">SKU (Código Único)</label>
                    <input type="text" id="sku" required placeholder="Ej: PROD-100" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Nombre Comercial</label>
                    <input type="text" id="nombre" required placeholder="Ej: Monitor Gamer 24'" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Precio ($)</label>
                        <input type="number" id="precio" step="0.01" required placeholder="0.00" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Stock Inicial</label>
                        <input type="number" id="stock" required placeholder="0" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Categoría</label>
                    <input type="text" id="categoria" required placeholder="Ej: Electrónica" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Marca</label>
                    <input type="text" id="marca" required placeholder="Ej: ComercioTech" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition text-sm shadow-sm mt-2">
                    Guardar en Catálogo
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 lg:col-span-2">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-900">📋 Productos en Memoria</h2>
                <button onclick="cargarProductos()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded border border-gray-300 transition">
                    🔄 Actualizar Tabla
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-bold border-b border-gray-200">
                            <th class="py-3 px-4">SKU</th>
                            <th class="py-3 px-4">Nombre</th>
                            <th class="py-3 px-4">Categoría</th>
                            <th class="py-3 px-4">Precio</th>
                            <th class="py-3 px-4">Stock</th>
                            <th class="py-3 px-4 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-body" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "/api/productos";

        // Función 1: Leer productos (GET)
        async function cargarProductos() {
            try {
                const respuesta = await fetch(API_URL);
                const productos = await respuesta.json();
                const tablaBody = document.getElementById("tabla-productos-body");
                tablaBody.innerHTML = ""; // Limpiar tabla antes de rellenar

                if (productos.length === 0) {
                    tablaBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-400">No hay productos registrados en el catálogo.</td></tr>`;
                    return;
                }

                productos.forEach(producto => {
                    const fila = document.createElement("tr");
                    fila.className = "hover:bg-gray-50 transition-colors";
                    fila.innerHTML = `
                        <td class="py-3 px-4 font-mono text-xs font-bold text-blue-600">${producto.sku}</td>
                        <td class="py-3 px-4 font-medium text-gray-900">${producto.nombre} <br><span class="text-xs text-gray-400 font-normal">${producto.marca}</span></td>
                        <td class="py-3 px-4 text-gray-500">${producto.categoria}</td>
                        <td class="py-3 px-4 font-semibold text-gray-900">$${producto.precio.toLocaleString('es-CL')}</td>
                        <td class="py-3 px-4"><span class="px-2 py-1 text-xs rounded font-medium ${producto.stock > 0 ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}">${producto.stock} u.</span></td>
                        <td class="py-3 px-4 text-center">
                            <button onclick="eliminarProducto('${producto.sku}')" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded border border-red-200 transition">
                                Eliminar
                            </button>
                        </td>
                    `;
                    tablaBody.appendChild(fila);
                });
            } catch (error) {
                console.error("Error al cargar los productos:", error);
            }
        }

        // Función 2: Crear producto (POST)
        document.getElementById("formulario-producto").addEventListener("submit", async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            const nuevoProducto = {
                sku: document.getElementById("sku").value,
                nombre: document.getElementById("nombre").value,
                precio: parseFloat(document.getElementById("precio").value),
                stock: parseInt(document.getElementById("stock").value),
                categoria: document.getElementById("categoria").value,
                marca: document.getElementById("marca").value
            };

            try {
                const respuesta = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(nuevoProducto)
                });

                if (respuesta.status === 201) {
                    alert("✅ Producto agregado correctamente a la memoria RAM.");
                    document.getElementById("formulario-producto").reset(); // Limpiar formulario
                    cargarProductos(); // Refrescar la tabla
                } else {
                    const errorData = await respuesta.json();
                    alert(`❌ Error: ${errorData.detail}`);
                }
            } catch (error) {
                alert("❌ No se pudo conectar con el servidor API Backend.");
            }
        });

        // Función 3: Eliminar producto (DELETE)
        async function eliminarProducto(sku) {
            if (!confirm(`¿Está seguro de que desea eliminar el producto con SKU: ${sku}?`)) return;

            try {
                const respuesta = await fetch(`${API_URL}/${sku}`, { method: "DELETE" });
                if (respuesta.ok) {
                    alert("🗑️ Producto removido de la memoria RAM con éxito.");
                    cargarProductos(); // Refrescar la tabla
                } else {
                    alert("❌ No se pudo eliminar el producto.");
                }
            } catch (error) {
                console.error("Error al eliminar el producto:", error);
            }
        }

        // Carga inicial al abrir la página
        window.onload = cargarProductos;
    </script>
</body>
</html>
